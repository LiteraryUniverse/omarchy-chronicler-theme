# Chronicler — Alacritty
# Art Nouveau: aged vellum, iron gall ink, amber gold, forest green, carmine

[colors.primary]
background = "#1E1A0E"
foreground = "#F0E6C0"
dim_foreground = "#A09060"

[colors.cursor]
text = "#1E1A0E"
cursor = "#A12577"

[colors.vi_mode_cursor]
text = "#1E1A0E"
cursor = "#A12577"

[colors.search.matches]
foreground = "#1E1A0E"
background = "#C9A84C"

[colors.search.focused_match]
foreground = "CellBackground"
background = "CellForeground"

[colors.line_indicator]
foreground = "None"
background = "None"

[colors.footer_bar]
foreground = "#1E1A0E"
background = "#C9A84C"

[colors.selection]
text = "CellBackground"
background = "CellForeground"

