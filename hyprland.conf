# Chronicler — Hyprland
# Art Nouveau: sinuous vines, copper borders, carmine accent
# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf.

$activeBorderColor   = rgba(A12577ee) rgba(C9A84Cee) 60deg
$inactiveBorderColor = rgba(7A6030aa)

general {
    col.active_border   = $activeBorderColor
    col.inactive_border = $inactiveBorderColor
    border_size = 2
    gaps_in = 5
    gaps_out = 4
}

group {
    col.border_active = $activeBorderColor
}

decoration {
    rounding = 14
    rounding_power = 4
    shadow {
        enabled = false
        range = 15
        render_power = 5
        offset = 0 0
    }
    blur {
        enabled = true
        size = 3
        passes = 3
        contrast = 0.9
        brightness = 0.82
        vibrancy = 0.18
        vibrancy_darkness = 0.12
        noise = 0.02
        ignore_opacity = true
    }
}

# Flowing, organic animations — deep Art Nouveau
animations {
    enabled = yes

    bezier = vineFlow,  0.16, 0.68, 0.28, 1.00
    bezier = vineFade,  0.30, 0.00, 0.20, 1.00

    animation = windows,          1, 3.0, vineFlow
    animation = windowsIn,        1, 2.8, vineFlow, popin 85%
    animation = windowsOut,       1, 2.4, vineFade, popin 90%
    animation = windowsMove,      1, 3.2, vineFlow

    animation = fade,             1, 2.6, vineFade
    animation = fadeIn,           1, 2.4, vineFlow
    animation = fadeOut,          1, 2.0, vineFade
    animation = fadeDim,          1, 2.0, vineFade

    animation = layers,           1, 2.6, vineFlow
    animation = layersIn,         1, 2.4, vineFlow, fade
    animation = layersOut,        1, 2.0, vineFade, fade

    animation = workspaces,       1, 2.8, vineFlow, slide
    animation = specialWorkspace, 1, 2.6, vineFlow, slidevert

    animation = border,           1, 3.2, vineFlow
    animation = borderangle,      1, 3.6, vineFlow
    animation = fadeSwitch,       1, 1.6, vineFade
}

