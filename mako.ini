# Chronicler — Mako notifications
# Art Nouveau: deep forest parchment, copper border, warm text

text-color=#F0E6C0
border-color=#C9A84C
background-color=#2A2410
width=420
height=110
padding=12
border-size=2
border-radius=8
font=Liberation Sans 11
anchor=top-right
outer-margin=20
default-timeout=5000
max-icon-size=32

[app-name=Spotify]
invisible=1

[mode=do-not-disturb]
invisible=true

[mode=do-not-disturb app-name=notify-send]
invisible=false
